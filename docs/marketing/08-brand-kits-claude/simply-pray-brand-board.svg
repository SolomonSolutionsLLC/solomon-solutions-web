<text x="194" y="342" class="body" font-size="11" fill="#9A958C">#C9A84C</text>
<text x="348" y="326" class="body" font-size="13" fill="#2C2C2A">Cream</text>
<text x="348" y="342" class="body" font-size="11" fill="#9A958C">#FAF6EC</text>

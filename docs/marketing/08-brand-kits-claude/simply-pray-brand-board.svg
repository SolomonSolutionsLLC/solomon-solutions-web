<svg width="100%" viewBox="0 0 680 712" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Simply Pray brand board</title>
<desc>Brand kit board for Simply Pray: logo lockup, forest-green and gold color system, Cormorant Garamond and DM Sans typography, the ACTS framework, and the brand tagline, on a cream canvas.</desc>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&amp;family=DM+Sans:wght@300;400;500&amp;display=swap');
.disp{font-family:'Cormorant Garamond',Georgia,serif;}
.body{font-family:'DM Sans',system-ui,sans-serif;}
</style>
<rect x="0" y="0" width="680" height="712" rx="18" fill="#FAF6EC"/>
<rect x="14" y="14" width="652" height="684" rx="12" fill="none" stroke="#E7DEC9" stroke-width="1"/>

<text x="40" y="50" class="body" font-size="12" letter-spacing="2" fill="#B0883A">Simply Pray · Brand kit</text>
<text x="640" y="50" text-anchor="end" class="body" font-size="12" letter-spacing="1" fill="#9A958C">01 — Identity</text>

<rect x="40" y="70" width="86" height="86" rx="20" fill="#2F5C51"/>
<circle cx="83" cy="142" r="4.5" fill="#C9A84C"/>
